services:
  postgres:
    image: postgres:16-alpine
    container_name: family-events-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: family_events
      POSTGRES_USER: family_events
      POSTGRES_PASSWORD: family_events
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family_events -d family_events"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
