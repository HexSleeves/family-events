<div id="{{ target_id }}"
     class="mt-3 rounded-xl border border-[var(--color-edge-subtle)] bg-[var(--color-surface)] p-3 text-sm shadow-[var(--shadow-xs)]"
     {% if job.state == 'running' %}
     hx-get="/api/jobs/{{ job.id }}?target_id={{ target_id | urlencode }}"
     hx-trigger="load delay:800ms"
     hx-swap="outerHTML"
     {% endif %}>
  <div class="flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <p class="font-medium text-[var(--color-heading)]">{{ job.label }}</p>
      <p class="text-[var(--color-muted)]">{{ message }}</p>
    </div>
    <span class="badge {% if job.state == 'running' %}badge-info{% elif job.state == 'failed' %}badge-danger{% else %}badge-success{% endif %}">
      {{ job.state }}
    </span>
  </div>
  <div class="mt-2 text-xs text-[var(--color-faint)]">
    Started: {{ started_at }}
    {% if job.finished_at %}
      · Finished: {{ finished_at }}
    {% endif %}
  </div>
</div>
