[build]
builder = "DOCKERFILE"
watchPatterns = [
  "Dockerfile",
  ".dockerignore",
  "railway.toml",
  "railway.cron.toml",
  "pyproject.toml",
  "uv.lock",
  "alembic.ini",
  "README.md",
  "package.json",
  "package-lock.json",
  "main.py",
  "alembic/**",
  "src/**",
  "scripts/railway-entrypoint.sh",
]

[deploy]
startCommand            = "APP_ROLE=cron ./scripts/railway-entrypoint.sh"
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 10
drainingSeconds         = 60
overlapSeconds          = 10
